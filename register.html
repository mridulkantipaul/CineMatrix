<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account - CineMatrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-box { max-width: 400px; margin: 50px auto; background: #1a242f; padding: 40px; border-radius: 10px; border: 1px solid #333; }
        .form-control { background: #0f171e; border: 1px solid #333; color: white; margin-bottom: 15px; }
        .form-control:focus { background: #222; color: white; border-color: #00a8e1; box-shadow: none; }
        .btn-prime { background: #00a8e1; color: white; width: 100%; font-weight: bold; border: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h2 class="text-center text-info fw-bold mb-4">🎥 CineMatrix</h2>
            <h4 class="text-center text-white mb-4">Create Account</h4>

            {% with messages = get_flashed_messages(category_filter=["error"]) %}
              {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form action="/register" method="POST">
                <label class="text-secondary small">Your Name</label>
                <input type="text" name="name" class="form-control" placeholder="First and last name" required>

                <label class="text-secondary small">Email</label>
                <input type="email" name="email" class="form-control" required>

                <label class="text-secondary small">Mobile Number</label>
                <input type="text" name="number" class="form-control" placeholder="e.g. 1234567890" required>

                <label class="text-secondary small">Age</label>
                <input type="number" name="age" class="form-control" placeholder="Enter your age" required>
                
                <label class="text-secondary small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                
                <button type="submit" class="btn-prime mt-3">Submit</button>
            </form>
            
            <p class="text-center text-secondary mt-4 mb-0 small">Already have an account? <a href="/login" class="text-info text-decoration-none">Sign in</a></p>
        </div>
    </div>
</body>
</html>
