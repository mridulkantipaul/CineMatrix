<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - CineMatrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-box { max-width: 400px; margin: 100px auto; background: #1a242f; padding: 40px; border-radius: 10px; border: 1px solid #333; }
        .form-control { background: #0f171e; border: 1px solid #333; color: white; margin-bottom: 15px; }
        .form-control:focus { background: #222; color: white; border-color: #00a8e1; box-shadow: none; }
        .btn-prime { background: #00a8e1; color: white; width: 100%; font-weight: bold; border: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h2 class="text-center text-info fw-bold mb-4">🎥 CineMatrix</h2>
            <h4 class="text-center text-white mb-4">Sign-In</h4>

            {% with messages = get_flashed_messages(category_filter=["error"]) %}
              {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <label class="text-secondary small">Email or Mobile Number</label>
                <input type="text" name="login_id" class="form-control" required>
                
                <label class="text-secondary small">Password</label>
                <input type="password" name="password" class="form-control" required>
                
                <button type="submit" class="btn-prime mt-3">Continue</button>
            </form>
            
            <p class="text-center text-secondary mt-4 mb-1 small">New to CineMatrix?</p>
            <a href="/register" class="btn btn-outline-secondary w-100">Create Account</a>
        </div>
    </div>
</body>
</html>
